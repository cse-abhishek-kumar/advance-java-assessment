server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config-repo
  profiles:
    active: native   # Uses local files, switch to 'git' for real Git repo

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

aws:
  discovery:
    enabled: false
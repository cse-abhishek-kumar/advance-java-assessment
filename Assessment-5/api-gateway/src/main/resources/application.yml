server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: movie-service-route
          uri: lb://MOVIE-SERVICE    # lb:// = Load Balanced via Eureka
          predicates:
            - Path=/movies/**

        - id: booking-service-route
          uri: lb://BOOKING-SERVICE
          predicates:
            - Path=/bookings/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/